  <style>
    body {font-family: 'Segoe UI', Tahoma, sans-serif; margin:0; background:#0f172a; color:white}
    header {padding:30px; text-align:center; background: linear-gradient(135deg, #1e293b 0%, #020617 100%); border-bottom: 3px solid #22c55e;}
    nav {padding:15px; text-align:center; background:#020617; position: sticky; top: 0; z-index: 100;}
    nav button {
        margin:5px; padding:10px 18px; border:none; border-radius:8px; cursor:pointer; 
        background:#334155; color:white; font-weight: bold; transition: 0.3s;
    }
    nav button:hover {background:#22c55e;}
    section {padding:20px; text-align:center}

        padding:12px; width:90%; max-width:500px; border-radius:25px; border:2px solid #334155;

    }
    .container {display:flex; flex-wrap:wrap; justify-content:center; gap: 20px;}
    .card {
      background:#1e293b; padding:15px; border-radius:15px; width:280px;
      transition: 0.3s; border: 1px solid #334155;
    }
    .card:hover {transform: translateY(-5px); border-color: #22c55e;}
    .card img {width:100%; height:160px; object-fit:cover; border-radius:10px;}
    .card h3 {margin: 15px 0 5px 0; color: #22c55e; font-size: 18px;}
    .card p {font-size: 13px; color: #cbd5e1; margin-bottom: 15px; height: 50px; overflow: hidden; line-height: 1.4;}
    .download {
      background: #22c55e; color: white; display: block; padding: 10px;
      text-decoration: none; border-radius: 8px; font-weight: bold;
    }
  </style>

function displayGames(filter) {
  const gamesDiv = document.getElementById('games');
  const notFound = document.getElementById('notfound');
  gamesDiv.innerHTML = '';
  const filtered = filter === 'all' ? games : games.filter(g => g.category === filter);
  
  if (filtered.length === 0) notFound.style.display = 'block';
  else {
    notFound.style.display = 'none';
    filtered.forEach(game => {
      gamesDiv.innerHTML += `
        <div class="card">
          <img src="${game.image}" alt="${game.name}">
          <h3>${game.name}</h3>
          <p>${game.desc}</p>
          <a href="${game.link}" target="_blank" class="download">تحميل الآن</a>
        </div>`;
    });
  }
}

function searchGame() {
  const q = document.getElementById('search').value.toLowerCase();
  const gamesDiv = document.getElementById('games');
  const filtered = games.filter(g => g.name.toLowerCase().includes(q));
  gamesDiv.innerHTML = '';
  filtered.forEach(game => {
    gamesDiv.innerHTML += `
      <div class="card">
        <img src="${game.image}" alt="${game.name}">
        <h3>${game.name}</h3>
        <p>${game.desc}</p>
        <a href="${game.link}" target="_blank" class="download">تحميل الآن</a>
      </div>`;
  });
}

displayGames('all');
</script>
